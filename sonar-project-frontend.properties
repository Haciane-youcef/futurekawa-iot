# ============================================================
#  FutureKawa — SonarQube : Frontend React
#  Fichier de configuration de l'analyse JavaScript/React
#
#  Placé à la racine du projet frontend.
# ============================================================

# ── Identifiant unique ───────────────────────────────────────
sonar.projectKey=futurekawa-frontend
sonar.projectName=FutureKawa — Frontend React
sonar.projectVersion=1.0

# ── Sources ──────────────────────────────────────────────────
sonar.sources=src

# Exclusions classiques React
sonar.exclusions=\
    node_modules/**,\
    build/**,\
    dist/**,\
    coverage/**,\
    **/*.test.js,\
    **/*.test.jsx,\
    **/*.spec.js,\
    **/*.spec.jsx,\
    src/setupTests.js

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# ── Langage ──────────────────────────────────────────────────
sonar.language=js

# ── Encodage ─────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Rapport de couverture Jest ───────────────────────────────
# Généré par : npm test -- --coverage --coverageReporters=lcov
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── ECMAScript version ───────────────────────────────────────
sonar.javascript.ecmaVersion=2020

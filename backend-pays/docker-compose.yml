version: '3.8'

# ================================================================
#  FutureKawa — Stack Brésil
#
#  Une seule image générique josef3215/futurekawa-backend-pays
#  Le pays et tous les paramètres sont injectés par variables d'env.
#
#  Pour ajouter un pays :
#    1. Copier ce fichier → docker-compose.equateur.yml
#    2. Changer PAYS, DATABASE_URL, les ports, MQTT_BROKER
#    3. docker compose -f docker-compose.equateur.yml up -d
# ================================================================

services:

  # ── Base de données PostgreSQL (Brésil) ──────────────────────
  postgres:
    image: postgres:15
    container_name: futurekawa-db-bresil
    environment:
      POSTGRES_USER:     futurekawa
      POSTGRES_PASSWORD: futurekawa123
      POSTGRES_DB:       futurekawa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_bresil:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U futurekawa"]
      interval: 5s
      timeout:  5s
      retries:  5

  # ── Broker MQTT Mosquitto (Brésil) ───────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: futurekawa-mqtt-bresil
    ports:
      - "1883:1883"
    volumes:
      - futurekawa_mosquitto_config:/mosquitto/config/

  # ── Backend Python FastAPI (image générique) ─────────────────
  backend:
    image: ${BACKEND_IMAGE:-josef3215/futurekawa-backend-pays:latest}
    container_name: futurekawa-backend-bresil
    ports:
      - "8000:8000"        
    environment:

      PAYS: bresil
      DATABASE_URL: postgresql://futurekawa:futurekawa123@postgres:5432/futurekawa

      # ── MQTT ─────────────────────────────────────────────────
      MQTT_BROKER: mosquitto
      MQTT_PORT:   "1883"

      SMTP_SERVER:     smtp.gmail.com
      SMTP_PORT:       "587"
      SENDER_EMAIL:    ${SENDER_EMAIL:-}
      SENDER_PASSWORD: ${SENDER_PASSWORD:-}

    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: always

volumes:
  postgres_data_bresil:
  futurekawa_mosquitto_config:
    external: true
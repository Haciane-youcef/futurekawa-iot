services:
  postgres-bresil:
    image: postgres:15
    container_name: futurekawa-db-bresil
    environment:
      POSTGRES_USER: ${BRESIL_DB_USER:-futurekawa}
      POSTGRES_PASSWORD: ${BRESIL_DB_PASSWORD:-futurekawa123}
      POSTGRES_DB: ${BRESIL_DB_NAME:-futurekawa_bresil}
    ports:
      - "${BRESIL_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_bresil:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BRESIL_DB_USER:-futurekawa} -d ${BRESIL_DB_NAME:-futurekawa_bresil}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto-bresil:
    image: eclipse-mosquitto:2
    container_name: futurekawa-mqtt-bresil
    ports:
      - "${BRESIL_MQTT_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend-pays-bresil:
    image: ${BACKEND_IMAGE:-josef3215/futurekawa-backend-pays:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: futurekawa-backend-bresil
    environment:
      PAYS: bresil
      DATABASE_URL: postgresql://${BRESIL_DB_USER:-futurekawa}:${BRESIL_DB_PASSWORD:-futurekawa123}@postgres-bresil:5432/${BRESIL_DB_NAME:-futurekawa_bresil}
      MQTT_BROKER: mosquitto-bresil
      MQTT_PORT: 1883
      JWT_SECRET: ${JWT_SECRET:-futurekawa-dev-secret-change-in-prod}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SENDER_EMAIL: ${SENDER_EMAIL:-}
      SENDER_PASSWORD: ${SENDER_PASSWORD:-}
    ports:
      - "${BRESIL_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres-bresil:
        condition: service_healthy
      mosquitto-bresil:
        condition: service_started
    restart: always

volumes:
  postgres_data_bresil:
